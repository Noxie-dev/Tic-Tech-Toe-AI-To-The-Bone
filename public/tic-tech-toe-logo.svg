<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background -->
  <rect width="500" height="500" fill="#0a3d62" rx="50" ry="50" />
  
  <!-- Game board -->
  <line x1="166.67" y1="100" x2="166.67" y2="400" stroke="#0c5460" stroke-width="15" />
  <line x1="333.33" y1="100" x2="333.33" y2="400" stroke="#0c5460" stroke-width="15" />
  <line x1="100" y1="166.67" x2="400" y2="166.67" stroke="#0c5460" stroke-width="15" />
  <line x1="100" y1="333.33" x2="400" y2="333.33" stroke="#0c5460" stroke-width="15" />
  
  <!-- X marks with circuit patterns -->
  <g fill="none" stroke="#0f9b8e" stroke-width="12" stroke-linecap="round">
    <!-- Top left X -->
    <line x1="120" y1="120" x2="213.33" y2="213.33" />
    <line x1="213.33" y1="120" x2="120" y2="213.33" />
    <!-- Circuit lines -->
    <path d="M120,120 L80,120 L80,80" />
    <path d="M120,213.33 L80,213.33 L80,250" />
    
    <!-- Top right X -->
    <line x1="380" y1="120" x2="286.67" y2="213.33" />
    <line x1="286.67" y1="120" x2="380" y2="213.33" />
    <!-- Circuit lines -->
    <path d="M380,120 L420,120 L420,80" />
    <path d="M380,213.33 L420,213.33" />
    
    <!-- Bottom left X -->
    <line x1="120" y1="286.67" x2="213.33" y2="380" />
    <line x1="213.33" y1="286.67" x2="120" y2="380" />
    <!-- Circuit lines -->
    <path d="M120,380 L80,380 L80,420" />
    
    <!-- Bottom right X -->
    <line x1="380" y1="286.67" x2="286.67" y2="380" />
    <line x1="286.67" y1="286.67" x2="380" y2="380" />
    <!-- Circuit lines -->
    <path d="M380,380 L420,380 L420,420" />
    <path d="M286.67,380 L250,420" />
  </g>
  
  <!-- O marks (smiley faces) -->
  <g>
    <!-- Top center O -->
    <circle cx="250" cy="125" r="40" fill="#ffcc29" />
    <circle cx="235" cy="115" r="5" fill="#0a3d62" />
    <circle cx="265" cy="115" r="5" fill="#0a3d62" />
    <path d="M230,135 Q250,155 270,135" fill="none" stroke="#0a3d62" stroke-width="4" />
    
    <!-- Middle right O -->
    <circle cx="375" cy="250" r="40" fill="#ffcc29" />
    <circle cx="360" cy="240" r="5" fill="#0a3d62" />
    <circle cx="390" cy="240" r="5" fill="#0a3d62" />
    <path d="M355,260 Q375,280 395,260" fill="none" stroke="#0a3d62" stroke-width="4" />
    
    <!-- Bottom center O -->
    <circle cx="250" cy="375" r="40" fill="#ffcc29" />
    <circle cx="235" cy="365" r="5" fill="#0a3d62" />
    <circle cx="265" cy="365" r="5" fill="#0a3d62" />
    <path d="M230,385 Q250,405 270,385" fill="none" stroke="#0a3d62" stroke-width="4" />
  </g>
  
  <!-- Circuit board patterns -->
  <g fill="none" stroke="#0f9b8e" stroke-width="3" stroke-linecap="round">
    <path d="M120,50 L120,80" />
    <path d="M250,50 L250,80" />
    <path d="M380,50 L380,80" />
    <path d="M50,120 L80,120" />
    <path d="M50,250 L80,250" />
    <path d="M50,380 L80,380" />
    <path d="M420,250 L450,250" />
    <path d="M250,420 L250,450" />
    <path d="M380,420 L380,450" />
    
    <!-- Connection dots -->
    <circle cx="120" cy="50" r="5" fill="#0f9b8e" />
    <circle cx="250" cy="50" r="5" fill="#0f9b8e" />
    <circle cx="380" cy="50" r="5" fill="#0f9b8e" />
    <circle cx="50" cy="120" r="5" fill="#0f9b8e" />
    <circle cx="50" cy="250" r="5" fill="#0f9b8e" />
    <circle cx="50" cy="380" r="5" fill="#0f9b8e" />
    <circle cx="450" cy="250" r="5" fill="#0f9b8e" />
    <circle cx="250" cy="450" r="5" fill="#0f9b8e" />
    <circle cx="380" cy="450" r="5" fill="#0f9b8e" />
  </g>
</svg>
